# trading_operation + GeeGooBot agent-api BFF（生产同源）

# 运营 Web 静态资源 + BFF 反代，浏览器无需 CORS。
# 部署路径示例：/var/www/trading_operation/build/web

server {
    listen 443 ssl http2;
    server_name ops.example.com;

    # ssl_certificate     /etc/letsencrypt/live/ops.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ops.example.com/privkey.pem;

    root /var/www/trading_operation/build/web;
    index index.html;

    # Flutter Web SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # GeeGooBot agent-api BFF → agent-runtime /v1/*
    # agent-api 监听 127.0.0.1:3110（或同机内网）
    location /op_agent/ {
        proxy_pass http://127.0.0.1:3110/op_agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 320s;
        proxy_send_timeout 320s;
        proxy_buffering off;          # SSE: chat/stream, sessions/events/stream
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }

    # 可选：直连 agent-runtime（内网调试 / 不经 BFF）
    # location /agent-runtime/ {
    #     proxy_pass http://AGENT_RUNTIME_HOST:3400/;
    #     proxy_http_version 1.1;
    #     proxy_read_timeout 320s;
    #     proxy_buffering off;
    # }
}

# server_url.dart（生产）：
#   const bool agent_use_bff = true;
#   const bool agent_bff_use_proxy = true;
#   const String agent_bff_proxy_path = '/op_agent';
#   const String agent_api_key = '<GEEGOO_BOT_AGENT_API_KEY>';

